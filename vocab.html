<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>單字｜每日英語學習（Vue + Bootstrap 5）</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { scroll-behavior:smooth; }
    .pron { color:#6c757d; }
    .badge-level { font-size:.8rem; }
    .sticky-topbar { position:sticky; top:0; z-index:1020; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-topbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">English Notes</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="navMain" class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="vocab.html">單字</a></li>
        <li class="nav-item"><a class="nav-link" href="dialogue.html">對話</a></li>
        <li class="nav-item"><a class="nav-link" href="reading.html">閱讀</a></li>
      </ul>
      <a class="btn btn-outline-light btn-sm" href="#" onclick="window.print();return false;"><i class="bi bi-printer me-1"></i>列印</a>
    </div>
  </div>
</nav>

<main id="app" class="container py-4">
  <div class="d-flex flex-wrap align-items-end gap-3">
    <div>
      <label class="form-label">選擇日期</label>
      <select v-model="selectedDate" class="form-select">
        <option v-for="d in dates" :key="d" :value="d">{{ d }}</option>
      </select>
    </div>
    <div class="ms-auto">
      <a class="btn btn-outline-secondary" :href="'index.html?date='+selectedDate"><i class="bi bi-house me-1"></i>回首頁</a>
    </div>
  </div>
  <hr/>
  <div v-if="session">
    <h5><span class="badge bg-primary me-2">{{ session.date }}</span> 今日新單字</h5>
    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead><tr><th>單字</th><th>中文</th><th>發音</th></tr></thead>
        <tbody>
          <tr v-for="w in session.newWords" :key="w.word">
            <td><strong>{{ w.word }}</strong></td>
            <td>{{ w.zh }}</td>
            <td class="pron">{{ w.pron }}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <h6 class="mt-4">🔁 雪球複習</h6>
    <p><span v-for="r in session.review" :key="r" class="badge bg-secondary me-2">{{ r }}</span></p>
  </div>
</main>
<script>
const { createApp } = Vue;
createApp({
  setup(){
    const params = new URLSearchParams(location.search);
    const latest = window.SESSIONS.at(-1)?.date;
    let selectedDate = Vue.ref(params.get('date') || latest);
    const dates = Vue.computed(()=> window.SESSIONS.map(s => s.date));
    const session = Vue.computed(()=> window.SESSIONS.find(s => s.date === selectedDate.value));
    return { selectedDate, dates, session };
  }
}).mount('#app');
</script>

<footer class="border-top py-4 mt-5">
  <div class="container small text-muted d-flex justify-content-between">
    <div>© 2025 英語學習筆記 (Vue + Bootstrap 5)</div>
    <div><a href="index.html">回首頁</a></div>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="assets/data.js"></script>
</body>
</html>
